$kind: http-request
name: Update Product
method: PUT
url: '{{baseUrl}}/api/products/{{product_id}}'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Kaos Polos Premium Updated",
      "price": 90000,
      "stock": 80
    }
