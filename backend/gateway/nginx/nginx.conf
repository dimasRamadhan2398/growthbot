events {
    worker_connections 1024;
}

http {
    upstream tenant_service {
        server tenant_service:8001;
    }
    upstream catalog_service {
        server catalog_service:8002;
    }
    upstream order_service {
        server order_service:8003;
    }
    upstream crm_service {
        server crm_service:8004;
    }
    upstream kb_service {
        server kb_service:8005;
    }

    server {
        listen 8000;

        location /api/tenants {
            proxy_pass http://tenant_service;
        }
        location /api/stores {
            proxy_pass http://tenant_service;
        }

        location /api/categories {
            proxy_pass http://catalog_service;
        }
        location /api/products {
            proxy_pass http://catalog_service;
        }

        location /api/orders {
            proxy_pass http://order_service;
        }
        location /api/shipping {
            proxy_pass http://order_service;
        }

        location /api/leads {
            proxy_pass http://crm_service;
        }
        location /api/agents {
            proxy_pass http://crm_service;
        }

        location /api/kb-files {
            proxy_pass http://kb_service;
        }

        location /api/dashboard {
            proxy_pass http://tenant_service;
        }

        # Handle CORS
        location / {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Tenant-ID,X-Branch-ID,X-Outlet-ID';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }
    }
}
