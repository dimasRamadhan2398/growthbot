version: "3.8"
services:
  db:
    image: postgres:16-alpine
    container_name: humaispace_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: humaispace_backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT}:8000"
    environment:
      # URL Database dirakit otomatis menggunakan variabel dari .env
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    depends_on:
      - db

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: humaispace_web
    restart: unless-stopped
    ports:
      - "${WEB_PORT}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
